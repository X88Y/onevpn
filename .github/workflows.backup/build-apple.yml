name: Build Apple

on:
  workflow_dispatch:

concurrency:
  group: build-apple-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.2"
  PYTHON_VERSION: "3.12"
  NDK_VERSION: r29
  LIBXRAY_REF: main
  BUILD_NUMBER: ${{ github.run_number }}
  BASE_BUNDLE_IDENTIFIER: apple.svyatvpn.com

jobs:
  # =================================================================
  # iOS — uploads to App Store Connect (TestFlight) via fastlane
  # =================================================================
  ios:
    runs-on: macos-26
    timeout-minutes: 60
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer
    defaults:
      run:
        working-directory: MVMVpn
    steps:
      - uses: actions/checkout@v6
        with:
          path: MVMVpn

      - uses: actions/checkout@v6
        with:
          repository: XTLS/libMVM
          ref: ${{ env.LIBXRAY_REF }}
          path: libMVM

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Flutter
        run: bash build_scripts/setup_flutter.sh

      - name: Install FlutterFire CLI
        run: |
          dart pub global activate flutterfire_cli
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install Python build deps
        run: pip install pyyaml requests typer

      - name: Restore Firebase configs
        env:
          FIREBASE_JSON_B64: ${{ secrets.FIREBASE_JSON_BASE64 }}
          FIREBASE_OPTIONS_B64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
          IOS_GSI_PLIST_B64: ${{ secrets.APPLE_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          echo "$FIREBASE_JSON_B64" | base64 -d > firebase.json
          echo "$FIREBASE_OPTIONS_B64" | base64 -d > lib/firebase_options.dart
          echo "$IOS_GSI_PLIST_B64" | base64 -d > swift/AppStore/GoogleService-Info.plist

      - name: Restore App Store Connect API key
        env:
          ASC_KEY_B64: ${{ secrets.FASTLANE_ASC_KEY_BASE64 }}
        run: echo "$ASC_KEY_B64" | base64 -d > ios/fastlane/AuthKey.p8

      - uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTS_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTS_P12_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - uses: apple-actions/download-provisioning-profiles@v5
        with:
          bundle-id: ${{ env.BASE_BUNDLE_IDENTIFIER }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.FASTLANE_ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.FASTLANE_ASC_KEY_ID }}
          api-private-key: ${{ secrets.FASTLANE_ASC_KEY_PEM }}
      - uses: apple-actions/download-provisioning-profiles@v5
        with:
          bundle-id: ${{ env.BASE_BUNDLE_IDENTIFIER }}.tun
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.FASTLANE_ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.FASTLANE_ASC_KEY_ID }}
          api-private-key: ${{ secrets.FASTLANE_ASC_KEY_PEM }}

      - name: Build & upload
        env:
          FASTLANE_ASC_KEY_ID: ${{ secrets.FASTLANE_ASC_KEY_ID }}
          FASTLANE_ASC_ISSUER_ID: ${{ secrets.FASTLANE_ASC_ISSUER_ID }}
          ADMOB_APP_ID_IOS: ${{ secrets.ADMOB_APP_ID_IOS }}
          ADMOB_AD_UNIT_ID_ANDROID: ${{ secrets.ADMOB_AD_UNIT_ID_ANDROID }}
          ADMOB_AD_UNIT_ID_IOS: ${{ secrets.ADMOB_AD_UNIT_ID_IOS }}
        run: python3 build_scripts/main.py MVMVpn ios

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios
          path: output/MVMVpn-ios*.ipa
          if-no-files-found: error

  # =================================================================
  # macOS (MAS) — universal binary, uploads to App Store Connect
  # =================================================================
  macos:
    runs-on: macos-26
    timeout-minutes: 60
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer
    defaults:
      run:
        working-directory: MVMVpn
    steps:
      - uses: actions/checkout@v6
        with:
          path: MVMVpn

      - uses: actions/checkout@v6
        with:
          repository: XTLS/libMVM
          ref: ${{ env.LIBXRAY_REF }}
          path: libMVM

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Flutter
        run: bash build_scripts/setup_flutter.sh

      - name: Install FlutterFire CLI
        run: |
          dart pub global activate flutterfire_cli
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install Python build deps
        run: pip install pyyaml requests typer

      - name: Restore Firebase configs
        env:
          FIREBASE_JSON_B64: ${{ secrets.FIREBASE_JSON_BASE64 }}
          FIREBASE_OPTIONS_B64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
          MACOS_GSI_PLIST_B64: ${{ secrets.APPLE_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          echo "$FIREBASE_JSON_B64" | base64 -d > firebase.json
          echo "$FIREBASE_OPTIONS_B64" | base64 -d > lib/firebase_options.dart
          echo "$MACOS_GSI_PLIST_B64" | base64 -d > swift/AppStore/GoogleService-Info.plist

      - name: Restore App Store Connect API key
        env:
          ASC_KEY_B64: ${{ secrets.FASTLANE_ASC_KEY_BASE64 }}
        run: echo "$ASC_KEY_B64" | base64 -d > macos/fastlane/AuthKey.p8

      - uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTS_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTS_P12_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - uses: apple-actions/download-provisioning-profiles@v5
        with:
          bundle-id: ${{ env.BASE_BUNDLE_IDENTIFIER }}
          profile-type: MAC_APP_STORE
          issuer-id: ${{ secrets.FASTLANE_ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.FASTLANE_ASC_KEY_ID }}
          api-private-key: ${{ secrets.FASTLANE_ASC_KEY_PEM }}
      - uses: apple-actions/download-provisioning-profiles@v5
        with:
          bundle-id: ${{ env.BASE_BUNDLE_IDENTIFIER }}.tun
          profile-type: MAC_APP_STORE
          issuer-id: ${{ secrets.FASTLANE_ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.FASTLANE_ASC_KEY_ID }}
          api-private-key: ${{ secrets.FASTLANE_ASC_KEY_PEM }}

      - name: Build & upload
        env:
          FASTLANE_ASC_KEY_ID: ${{ secrets.FASTLANE_ASC_KEY_ID }}
          FASTLANE_ASC_ISSUER_ID: ${{ secrets.FASTLANE_ASC_ISSUER_ID }}
          FASTLANE_MAS_INSTALLER_CERT: ${{ secrets.FASTLANE_MAS_INSTALLER_CERT }}
          ADMOB_AD_UNIT_ID_ANDROID: ${{ secrets.ADMOB_AD_UNIT_ID_ANDROID }}
          ADMOB_AD_UNIT_ID_IOS: ${{ secrets.ADMOB_AD_UNIT_ID_IOS }}
        run: python3 build_scripts/main.py MVMVpn macos

  # =================================================================
  # Create a GitHub Release and attach non-store artifacts.
  # Only runs on tag pushes (v*), not on manual dispatch.
  # =================================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ ios, macos ]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
